name: Praktikum CI
on: [push]
jobs:
  test-kital:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Pytest
        run: pip install pytest
      - name: Run Tests
        run: python -m pytest